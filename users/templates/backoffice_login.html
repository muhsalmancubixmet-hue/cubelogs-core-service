<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CubeLogs Backoffice | Operator Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-dark: #1e3a8a;
      --bg-app: #0f172a; /* Deep Slate dark background */
      --bg-gradient: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --surface: #1e293b;
      --surface-glass: rgba(30, 41, 59, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: #3b82f6;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-heading: 'Outfit', var(--font-sans);
      
      --radius-md: 10px;
      --radius-lg: 16px;
      --shadow-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
      --transition-normal: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    body {
      background: var(--bg-app);
      background-image: var(--bg-gradient);
      color: var(--text-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Decorative background glowing effects */
    .glow-ball {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, rgba(37, 99, 235, 0) 70%);
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
    }
    
    .glow-ball-1 {
      top: -100px;
      right: -100px;
    }
    
    .glow-ball-2 {
      bottom: -150px;
      left: -150px;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.1) 0%, rgba(96, 165, 250, 0) 70%);
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      background: var(--surface-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-premium);
      z-index: 10;
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      text-align: center;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #60a5fa;
      filter: drop-shadow(0 0 12px rgba(96, 165, 250, 0.4));
      margin-bottom: 8px;
    }

    .brand-logo svg {
      width: 48px;
      height: 48px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-name {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-tag {
      font-size: 0.78rem;
      color: #60a5fa;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .input-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    .form-control {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-main);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: all var(--transition-normal);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--border-focus);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .btn-submit {
      width: 100%;
      padding: 12px 24px;
      background: var(--primary);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-normal);
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #f87171;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .alert-error svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .footer-note a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
      transition: color var(--transition-normal);
    }

    .footer-note a:hover {
      color: #3b82f6;
    }
  </style>
</head>
<body>
  <div class="glow-ball glow-ball-1"></div>
  <div class="glow-ball glow-ball-2"></div>

  <div class="login-container">
    <div class="brand-header">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
      </div>
      <span class="brand-name">CubeLogs</span>
      <span class="brand-tag">Backoffice Login</span>
    </div>

    {% if error %}
    <div class="alert-error">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Operator Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          </span>
          <input type="email" id="username" name="username" class="form-control" placeholder="operator@cubelogs.com" required autocomplete="email" autofocus>
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 28px;">
        <label for="password">Security Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </span>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••••••" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn-submit">
        <span>Verify Session credentials</span>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 2px;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>
    </form>

    <div class="footer-note">
      <span>Return to main <a href="/">Corporate Landing Page</a></span>
    </div>
  </div>
</body>
</html>
